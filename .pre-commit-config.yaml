repos:
  - repo: local
    hooks:
      - id: cargo-check
        name: cargo check
        entry: bash tools/ci/with_llvm_env.sh cargo check --workspace
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-build
        name: cargo build
        entry: bash tools/ci/with_llvm_env.sh cargo build --workspace
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-test
        name: cargo test
        entry: bash tools/ci/with_llvm_env.sh cargo test --workspace
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: bash tools/ci/with_llvm_env.sh cargo clippy --workspace --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all
        language: system
        types: [rust]
        pass_filenames: false
