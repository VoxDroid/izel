name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  LLVM_SYS_170_PREFIX: /usr/lib/llvm-17
  IZEL_NEAR_COVERAGE: 95
  IZEL_MIN_COVERAGE: 100

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM 17
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-17-dev clang-17 libpolly-17-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Workspace tests
        run: cargo test --workspace

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM 17
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-17-dev clang-17 libpolly-17-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Coverage summary
        id: coverage_summary
        shell: bash
        run: |
          set -euo pipefail
          output="$(bash tools/ci/check_coverage.sh --report-only)"
          echo "$output"

          measured_line="$(grep -E 'Report-only mode: measured line coverage is [0-9]+(\.[0-9]+)?%' <<<"$output" | tail -n1 || true)"
          measured_percent="$(grep -Eo '[0-9]+(\.[0-9]+)?' <<<"$measured_line" | tail -n1 || true)"

          if [[ -z "$measured_percent" ]]; then
            measured_percent="0"
          fi

          echo "line_percent=$measured_percent" >> "$GITHUB_OUTPUT"

      - name: Enforce strict coverage when near target
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          line_percent="${{ steps.coverage_summary.outputs.line_percent }}"
          near_threshold="${IZEL_NEAR_COVERAGE}"
          strict_target="${IZEL_MIN_COVERAGE}"

          echo "Measured line coverage: ${line_percent}%"
          echo "Near-target threshold: ${near_threshold}%"
          echo "Strict target: ${strict_target}%"

          if awk -v got="$line_percent" -v near="$near_threshold" 'BEGIN { exit !(got + 0 >= near + 0) }'; then
            echo "Coverage is near target, enforcing strict minimum."
            if awk -v got="$line_percent" -v want="$strict_target" 'BEGIN { exit !(got + 0 >= want + 0) }'; then
              echo "Coverage satisfies strict minimum."
            else
              echo "Coverage ${line_percent}% is below strict minimum ${strict_target}%."
              exit 1
            fi
          else
            echo "Coverage is below near-target threshold; strict enforcement deferred for this PR."
          fi

      - name: Generate LCOV report
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
