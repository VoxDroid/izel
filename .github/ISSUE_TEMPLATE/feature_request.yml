name: Feature request
description: Propose an improvement to the language, compiler, tooling, or docs.
title: "[Feature]: "
labels:
  - enhancement
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement.
        Clear problem statements and concrete examples help maintainers evaluate requests.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What user or developer problem are you trying to solve?
      placeholder: I am unable to ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe your preferred solution.
      placeholder: We could add ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternatives or tradeoffs you considered.

  - type: textarea
    id: examples
    attributes:
      label: Examples or Prior Art
      description: Links, snippets, or references that help explain the request.

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who benefits, and what parts of the codebase are likely affected?

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to contribute an implementation for this feature.
          required: false
