name: Question or support
description: Ask a usage or development question about Izel.
title: "[Question]: "
labels:
  - question
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Use this template for usage, setup, and workflow questions.
        For vulnerabilities, do not open a public issue. See SECURITY.md.

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What are you trying to do, and where are you blocked?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Commands run, code snippets, and any relevant output.
      render: text

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS and toolchain details.
      placeholder: Windows 11, rustc 1.xx.x, LLVM 17
